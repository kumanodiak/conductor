# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  - board: xiao_ble//zmk
    shield: monokey_R rgbled_adapter
    # v0.4.8 TEST: drop studio-rpc-usb-uart snippet to disable USB CDC ACM.
    # Hypothesis: USB CDC polling/interrupt on R central contributes to the
    # USB-connected typing lag (L->R order swap, ~200ms observed).
    # USB HID still works (CONFIG_ZMK_USB=y from board defconfig). Studio
    # connects over BLE only via CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y.
    # Debug variant below keeps both snippets for USB CDC logging.
    artifact-name: monokey_R-rgbled_adapter-xiao_ble-zmk
  - board: xiao_ble//zmk
    shield: monokey_L rgbled_adapter
    artifact-name: monokey_L-rgbled_adapter-xiao_ble-zmk
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings_reset-xiao_ble-zmk
  - board: xiao_ble//zmk
    shield: monokey_R rgbled_adapter
    snippet: studio-rpc-usb-uart zmk-usb-logging
    artifact-name: monokey_R-rgbled_adapter-xiao_ble-zmk-debug
